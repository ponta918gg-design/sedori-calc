<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>仕入れ判断電卓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef0ec;          /* 明るいホーム床のグレー */
    --card:#ffffff;
    --ink:#1f2823;         /* 深緑がかった墨色 */
    --sub:#6b756e;
    --line:#d8dcd6;
    --green:#1a7a4a;       /* 駅名標の緑 */
    --led-bg:#101410;      /* 発車標の黒 */
    --led-buy:#57e389;     /* LED緑 */
    --led-maybe:#ffc233;   /* LED橙 */
    --led-skip:#ff6b5e;    /* LED赤 */
    --led-dim:#8a9a8e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Sans",sans-serif;
    font-size:16px;
    padding:14px 14px 40px;
    max-width:480px;
    margin:0 auto;
  }
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:2px 4px 10px;
  }
  header h1{
    font-size:17px;font-weight:700;margin:0;letter-spacing:.06em;
  }
  header h1::before{content:"▮ ";color:var(--green)}
  header .sub{font-size:11px;color:var(--sub)}

  /* ===== 発車標ふう判定ボード(シグネチャ) ===== */
  .board{
    background:var(--led-bg);
    border-radius:12px;
    padding:14px 16px 12px;
    font-family:"DotGothic16",monospace;
    box-shadow:inset 0 0 0 1px #000, 0 2px 8px rgba(20,30,24,.25);
    position:relative;overflow:hidden;
  }
  .board::after{ /* うっすらLEDドット感 */
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(rgba(0,0,0,.35) 1px, transparent 1px);
    background-size:3px 3px;opacity:.5;
  }
  .board .row1{
    display:flex;justify-content:space-between;
    color:var(--led-dim);font-size:12px;letter-spacing:.2em;
  }
  .board .row2{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-top:2px;
  }
  .verdict{font-size:40px;line-height:1.15;letter-spacing:.08em}
  .profit{font-size:30px;text-align:right}
  .board .row3{
    margin-top:6px;padding-top:7px;border-top:1px solid #2a332c;
    color:var(--led-dim);font-size:13px;
    display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;
  }
  .c-buy{color:var(--led-buy)} .c-maybe{color:var(--led-maybe)}
  .c-skip{color:var(--led-skip)} .c-dim{color:var(--led-dim)}

  /* ===== 入力 ===== */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-top:12px;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  label.field{display:block}
  label.field span{
    display:block;font-size:12px;color:var(--sub);font-weight:500;margin-bottom:4px;
  }
  input[type=number], input[type=text], select{
    width:100%;border:1.5px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:22px;font-weight:700;color:var(--ink);
    background:#fbfcfa;font-family:inherit;
    -moz-appearance:textfield;
  }
  select{font-size:15px;font-weight:500;padding:11px 10px}
  input:focus, select:focus{outline:2px solid var(--green);border-color:var(--green)}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .small input, .small select{font-size:16px;font-weight:600;padding:9px 10px}

  /* 販路切替 */
  .seg{display:flex;background:#e2e6e0;border-radius:10px;padding:3px;margin-bottom:12px}
  .seg button{
    flex:1;border:0;background:transparent;border-radius:8px;
    padding:9px 0;font-size:15px;font-weight:700;color:var(--sub);
    font-family:inherit;cursor:pointer;
  }
  .seg button.on{background:var(--green);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .lyp{
    display:flex;align-items:center;gap:8px;margin:-2px 2px 12px;
    font-size:13px;color:var(--sub);
  }
  .lyp input{width:18px;height:18px;accent-color:var(--green)}

  details{margin-top:12px}
  summary{
    font-size:13px;color:var(--sub);cursor:pointer;padding:6px 4px;
    user-select:none;
  }
  .note{font-size:11.5px;color:var(--sub);line-height:1.6;margin-top:10px}
  .presetlist{display:grid;grid-template-columns:1fr 84px;gap:6px;align-items:center;margin-top:8px}
  .presetlist div{font-size:13px}
  .presetlist input{font-size:15px;font-weight:600;padding:7px 8px}
  .bandgrid{
    display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:6px;
    align-items:center;margin-top:8px;
  }
  .bandgrid .bh{font-size:11px;color:var(--sub);font-weight:500}
  .bandgrid .bl{font-size:13px;font-weight:600}
  .bandgrid input{font-size:15px;font-weight:600;padding:7px 8px}
  .ac{
    width:100%;border:1.5px solid #d88;border-radius:10px;
    padding:9px 10px;background:#fff5f4;color:#b4372c;
    font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;
  }
  .ac:active{background:#ffe4e1}
  .btn{
    margin-top:10px;width:100%;border:0;border-radius:10px;padding:11px;
    background:var(--green);color:#fff;font-size:15px;font-weight:700;
    font-family:inherit;cursor:pointer;
  }
  .saved{font-size:12px;color:var(--green);text-align:center;margin-top:6px;min-height:1em}
</style>

<header>
  <h1>仕入れ判断電卓</h1>
  <div class="sub">手数料・送料込みで即判定</div>
</header>

<!-- 判定ボード -->
<div class="board" aria-live="polite">
  <div class="row1"><span>判 定</span><span>利 益</span></div>
  <div class="row2">
    <span id="verdict" class="verdict c-dim">− − −</span>
    <span id="profit" class="profit c-dim">¥ −</span>
  </div>
  <div class="row3">
    <span id="rate">利益率 −%</span>
    <span id="pace">月5万円まで −</span>
  </div>
</div>

<!-- 入力 -->
<div class="card">
  <div class="seg" role="tablist">
    <button id="segM" class="on" onclick="setPf('mercari')">メルカリ</button>
    <button id="segY" onclick="setPf('yahoo')">ヤフオク</button>
  </div>
  <label class="lyp" id="lypRow" style="display:none">
    <input type="checkbox" id="lyp" onchange="calc(true)">
    LYPプレミアム会員(手数料8.8%)
  </label>

  <div class="grid2">
    <label class="field"><span>仕入れ値(店頭価格)</span>
      <input type="number" id="cost" inputmode="numeric" placeholder="0" oninput="calc()">
    </label>
    <label class="field"><span>想定売値</span>
      <input type="number" id="price" inputmode="numeric" placeholder="0" oninput="calc()">
    </label>
  </div>

  <div class="grid2 small" style="margin-top:10px">
    <label class="field"><span>配送方法</span>
      <select id="shipSel" onchange="pickShip()"></select>
    </label>
    <label class="field"><span>送料(円・修正可)</span>
      <input type="number" id="ship" inputmode="numeric" oninput="calc()">
    </label>
  </div>
  <div class="grid2 small" style="margin-top:10px">
    <label class="field"><span>梱包材ほか(円)</span>
      <input type="number" id="pack" inputmode="numeric" oninput="calc(true)">
    </label>
    <label class="field"><span>&nbsp;</span>
      <button class="ac" onclick="clearInputs()">AC(クリア)</button>
    </label>
  </div>
</div>

<!-- 設定 -->
<details>
  <summary>⚙ 設定(判定基準・送料プリセットの編集)</summary>
  <div class="card small">
    <div style="font-size:13px;font-weight:700">判定基準(売値の帯で自動切替)</div>
    <div class="bandgrid">
      <div class="bh">売値の帯</div><div class="bh">利益率%以上</div><div class="bh">利益額¥以上</div>
      <div class="bl">〜3,000円</div>
      <input type="number" id="r0" inputmode="numeric" oninput="calc()">
      <input type="number" id="p0" inputmode="numeric" oninput="calc()">
      <div class="bl">3,000〜1万円</div>
      <input type="number" id="r1" inputmode="numeric" oninput="calc()">
      <input type="number" id="p1" inputmode="numeric" oninput="calc()">
      <div class="bl">1万円〜</div>
      <input type="number" id="r2" inputmode="numeric" oninput="calc()">
      <input type="number" id="p2" inputmode="numeric" oninput="calc()">
    </div>
    <div style="margin-top:12px;font-size:13px;font-weight:700">送料プリセット</div>
    <div class="presetlist" id="presetlist"></div>
    <button class="btn" onclick="saveSettings()">設定を保存</button>
    <div class="saved" id="savedMsg"></div>
    <div class="note">※送料は改定されることがあります。実際の料金と違っていたら、ここで直して保存してください。判定の目安:売値の帯ごとに「買い」=利益率と利益額の両方を満たす/「微妙」=基準の2/3以上/それ未満は「見送り」。低単価は率より額、高単価は額があれば率は低めでOK、という考え方です。</div>
  </div>
</details>

<script>
const BOUNDS = [3000, 10000]; /* 売値の帯の境界 */
const DEFAULTS = {
  lyp:false, pack:50, platform:'mercari',
  bands:[
    {rate:40, profit:500},
    {rate:30, profit:500},
    {rate:20, profit:2000},
  ],
  presets:[
    ['ネコポス', 210],
    ['ゆうパケットポスト', 215],
    ['ゆうパケット', 230],
    ['宅急便コンパクト(箱込)', 520],
    ['ゆうパケットプラス(箱込)', 520],
    ['宅急便60', 750],
    ['宅急便80', 850],
    ['宅急便100', 1050],
    ['宅急便120', 1200],
    ['その他(手入力)', 0],
  ]
};
let S = JSON.parse(JSON.stringify(DEFAULTS));
let platform = 'mercari';

const $ = id => document.getElementById(id);
const yen = n => '¥' + Math.round(n).toLocaleString('ja-JP');

function buildPresets(){
  const sel = $('shipSel'); sel.innerHTML = '';
  S.presets.forEach((p,i)=>{
    const o = document.createElement('option');
    o.value = i; o.textContent = p[0] + (p[1]>0 ? ' ¥'+p[1] : '');
    sel.appendChild(o);
  });
  const list = $('presetlist'); list.innerHTML='';
  S.presets.forEach((p,i)=>{
    if(p[0].startsWith('その他')) return;
    const name = document.createElement('div'); name.textContent = p[0];
    const inp = document.createElement('input');
    inp.type='number'; inp.inputMode='numeric'; inp.value = p[1];
    inp.oninput = ()=>{ S.presets[i][1] = Number(inp.value)||0; };
    list.appendChild(name); list.appendChild(inp);
  });
}
function pickShip(){
  const p = S.presets[Number($('shipSel').value)];
  if(!p[0].startsWith('その他')) $('ship').value = p[1];
  calc();
}
function clearInputs(){
  $('cost').value = '';
  $('price').value = '';
  calc();
  $('cost').focus();
}
function setPf(pf){
  platform = pf;
  $('segM').classList.toggle('on', pf==='mercari');
  $('segY').classList.toggle('on', pf==='yahoo');
  $('lypRow').style.display = pf==='yahoo' ? 'flex' : 'none';
  calc(true);
}
function feeRate(){
  if(platform==='mercari') return 0.10;
  return $('lyp').checked ? 0.088 : 0.10;
}
function calc(saveState){
  const cost = Number($('cost').value)||0;
  const price = Number($('price').value)||0;
  const ship = Number($('ship').value)||0;
  const pack = Number($('pack').value)||0;
  const v = $('verdict'), pr = $('profit'), rt = $('rate'), pc = $('pace');

  if(price<=0){
    v.textContent='− − −'; pr.textContent='¥ −';
    v.className='verdict c-dim'; pr.className='profit c-dim';
    rt.textContent='利益率 −%'; pc.textContent='月5万円まで −';
    return;
  }
  const fee = Math.floor(price * feeRate());
  const profit = price - fee - ship - pack - cost;
  const rate = profit / price * 100;

  pr.textContent = yen(profit);
  pc.textContent = profit>0 ? '月5万円まで ' + Math.ceil(50000/profit) + '個' : '月5万円まで −';

  const bi = price < BOUNDS[0] ? 0 : (price < BOUNDS[1] ? 1 : 2);
  const b = bandFromInputs(bi);
  let cls, label;
  if(profit >= b.profit && rate >= b.rate){ cls='c-buy'; label='買い'; }
  else if(profit >= b.profit*2/3 && rate >= b.rate*2/3){ cls='c-maybe'; label='微妙'; }
  else { cls='c-skip'; label='見送り'; }
  rt.textContent = '利益率 ' + rate.toFixed(1) + '%(基準 ' + b.rate + '%・¥' + b.profit + '〜)';
  v.textContent = label;
  v.className = 'verdict ' + cls;
  pr.className = 'profit ' + cls;

  if(saveState) persistQuiet();
}
function bandFromInputs(i){
  return {
    rate: Number($('r'+i).value) || DEFAULTS.bands[i].rate,
    profit: Number($('p'+i).value) || DEFAULTS.bands[i].profit
  };
}

/* ===== 保存 ===== */
function collect(){
  S.lyp = $('lyp').checked;
  S.pack = Number($('pack').value)||0;
  S.bands = [0,1,2].map(bandFromInputs);
  S.platform = platform;
}
async function persistQuiet(){
  try{ collect(); localStorage.setItem('sedori-calc-v1', JSON.stringify(S)); }catch(e){}
}
async function saveSettings(){
  collect();
  buildPresets();
  let ok = false;
  try{ localStorage.setItem('sedori-calc-v1', JSON.stringify(S)); ok = true; }catch(e){}
  $('savedMsg').textContent = ok ? '保存しました(次回も引き継がれます)' : '保存に失敗しました';
  setTimeout(()=>{$('savedMsg').textContent='';}, 2500);
  calc();
}
async function load(){
  try{
    const raw = localStorage.getItem('sedori-calc-v1');
    if(raw){
      const saved = JSON.parse(raw);
      S = Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), saved);
      if(!Array.isArray(S.presets) || !S.presets.length) S.presets = DEFAULTS.presets;
    }
  }catch(e){ /* 初回はキーが無いので正常 */ }
  $('lyp').checked = S.lyp;
  $('pack').value = S.pack;
  if(!Array.isArray(S.bands) || S.bands.length!==3) S.bands = DEFAULTS.bands;
  [0,1,2].forEach(i=>{
    $('r'+i).value = S.bands[i].rate;
    $('p'+i).value = S.bands[i].profit;
  });
  buildPresets();
  setPf(S.platform||'mercari');
  $('ship').value = S.presets[0][1];
}
load();
</script>
